<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurgerBoy Gacha</title>

        <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/nsanchezBG/BBG/main/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/nsanchezBG/BBG/main/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/nsanchezBG/BBG/main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/nsanchezBG/BBG/main/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://raw.githubusercontent.com/nsanchezBG/BBG/main/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://raw.githubusercontent.com/nsanchezBG/BBG/main/android-chrome-512x512.png">


    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bbBlue: '#0b64db',
                        bbDark: '#04172c',
                        bbRed: '#e8362a',
                        bbLight: '#cce0fc',
                    },
                    fontFamily: {
                        draft: ['DraftABlack', 'Arial Black', 'sans-serif'],
                        draftItalic: ['DraftABlackItalic', 'Arial Black', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Tipografías Custom - ACTUALIZADAS a .woff2 para máxima compatibilidad web móvil */
        @font-face {
            font-family: 'DraftABlack';
            src: url('https://raw.githubusercontent.com/nsanchezBG/BBG/main/DraftABlack.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/nsanchezBG/BBG/main/DraftABlack.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'DraftABlackItalic';
            src: url('https://raw.githubusercontent.com/nsanchezBG/BBG/main/DraftABlackItalic.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/nsanchezBG/BBG/main/DraftABlackItalic.otf') format('opentype');
            font-weight: normal;
            font-style: italic;
            font-display: swap;
        }

        /* Base Mobile Native */
        body {
            font-family: 'DraftABlackItalic', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .mobile-container {
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
        }

        .thick-border { border: 3.5px solid #04172c; }
        .medium-border { border: 2.5px solid #04172c; }

        .hard-inner-glow {
            --tw-ring-inset: inset;
            --tw-ring-color: #ffffff;
            --tw-ring-shadow: var(--tw-ring-inset) 2.5px 2.5px 0px 0px var(--tw-ring-color), var(--tw-ring-inset) -1.5px -1.5px 0px 0px rgba(255, 255, 255, 0.6);
            box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow) !important;
        }

        .input-pill {
            background-color: white; border-radius: 9999px; color: #0b64db; text-align: center;
            width: 100%; padding: 0.6rem 1rem; font-size: 1.1rem; outline: none; font-family: 'DraftABlackItalic', sans-serif; text-transform: uppercase;
        }
        .input-pill::placeholder { color: #b0cbf2; font-family: 'DraftABlackItalic', sans-serif; opacity: 1; }

        /* Scrollbars personalizados */
        .custom-scroll::-webkit-scrollbar, .modal-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ffffff; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #b0cbf2; border-radius: 4px; }

        /* Gachaballs Background */
        .gacha-bg { position: absolute; opacity: 0.12; animation: floatLeftToRight linear infinite; pointer-events: none; z-index: 0; will-change: transform; }
        @keyframes floatLeftToRight { 0% { transform: translateX(0) rotate(0deg); } 100% { transform: translateX(calc(100vw + 300px)) rotate(360deg); } }

        /* Animaciones Splashscreen y Globales */
        @keyframes warpIn { 0% { transform: scale(0.6) translateY(20px) rotate(-4deg); opacity: 0; filter: blur(4px); } 60% { transform: scale(1.05) translateY(-5px) rotate(2deg); opacity: 1; filter: blur(0px); } 100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; filter: blur(0px); } }
        .animate-warp-iso { animation: warpIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-warp-logo { animation: warpIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards; opacity: 0; }

        @keyframes floatIdle { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-8px) scale(1.025); } }
        .animate-idle { animation: floatIdle 3.5s ease-in-out infinite; }
        .animate-idle-delayed { animation: floatIdle 3.5s ease-in-out 1.2s infinite; }

        @keyframes floatSubtle { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-1.5px); } }
        .animate-subtle { animation: floatSubtle 8s ease-in-out infinite; }

        @keyframes floatBubble1 { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-4px) rotate(1deg); } }
        .animate-bubble-1 { animation: floatBubble1 3.8s ease-in-out infinite; }

        @keyframes floatBubble2 { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(3px) rotate(-1deg); } }
        .animate-bubble-2 { animation: floatBubble2 4.6s ease-in-out infinite; }

        /* Animación Botón Atrás */
        @keyframes fadeInLeft { 0% { transform: translateX(-15px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .animate-fade-in-left { animation: fadeInLeft 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        /* Animación Escáner */
        @keyframes zoomInMachine { 0% { transform: scale(1) translateY(0); opacity: 1; } 20% { transform: scale(0.9) translateY(10px); opacity: 1; } 100% { transform: scale(8) translateY(150px); opacity: 0; filter: blur(5px); } }
        .animate-zoom-machine { animation: zoomInMachine 0.8s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        @keyframes scanSpin { 0% { transform: rotate(0deg); } 25% { transform: rotate(180deg); } 35% { transform: rotate(195deg); } 45% { transform: rotate(180deg); } 70% { transform: rotate(0deg); } 80% { transform: rotate(-15deg); } 90%, 100% { transform: rotate(0deg); } }
        .animate-scan-spin { animation: scanSpin 1.6s ease-in-out infinite; }

        /* --------- ANIMACIONES DE GACHAPON --------- */
        @keyframes gachaZoomMachine {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            30% { transform: scale(0.7) translateY(20px); opacity: 1; }
            100% { transform: scale(8) translateY(150px); opacity: 0; filter: blur(5px); }
        }
        .animate-gacha-zoom { animation: gachaZoomMachine 1.1s cubic-bezier(0.5, 0, 0.2, 1) forwards; }

        @keyframes slowRock { 0%, 100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
        .animate-rocking { animation: slowRock 3s ease-in-out infinite; }

        /* Caída Perfecta al centro */
        @keyframes gachaBallDrop {
            0% { transform: translate(-50%, -150%) scale(0.3); opacity: 0; }
            10% { transform: translate(-50%, -130%) scale(0.3); opacity: 1; }
            50% { transform: translate(-50%, -30%) scale(0.35); }
            70% { transform: translate(-50%, -60%) scale(0.5); }
            90% { transform: translate(-50%, -45%) scale(0.65); }
            100% { transform: translate(-50%, -50%) scale(0.85); opacity: 1; }
        }
        .animate-gacha-drop { animation: gachaBallDrop 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* Temblor exacto en el eje */
        @keyframes violentShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -3px) rotate(-6deg); }
            20%, 40%, 60%, 80% { transform: translate(5px, 3px) rotate(6deg); }
        }
        .animate-violent-shake { animation: violentShake 0.1s infinite; }

        /* Destello Cegador */
        @keyframes blindingFlash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }
        .animate-flash { animation: blindingFlash 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; pointer-events: none; }

        @keyframes popInPrize {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; filter: blur(5px); }
            60% { transform: scale(1.1) rotate(5deg); opacity: 1; filter: blur(0); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-pop-prize { animation: popInPrize 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* Textos slide up */
        @keyframes slideUpFade {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUpFade 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        
        /* Levitación centrada matemáticamente */
        .prize-float-result { animation: floatPrizeResult 4s ease-in-out infinite; }
        @keyframes floatPrizeResult { 
            0%, 100% { transform: translateX(-50%) translateY(-50%) scale(1); } 
            50% { transform: translateX(-50%) translateY(calc(-50% - 12px)) scale(1); } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const ASSETS = {
            isologo: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/isologo.png",
            isoSimple: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/isosimple.png",
            logoSimple: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/logosimple.png",
            backIcon: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/backicon.png",
            gachaball: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/gachaball.png",
            loginIcon: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/loginicon.png",
            userLogo: "https://tofuu.getjusto.com/orioneat-prod/XnWYuHZkn4msS9FPL-logo-bb-07.png", // Nuevo Icono Usuario
            fondoEscaneo: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/fondoEscaneo.png",
            scanIcon: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/scanicon.png",
            destello: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/destello.png",
            fondoGacha: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/fondoGacha.png",
            mirilla1: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/mirilla1.png",
            mirilla2: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/mirilla2.png",
            premio5off: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/premio5off.png",
            premio10off: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/premio10ff.png",
            premioBbcap: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/premiobbcap.png",
            premioBurger: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/premioburgergratis.png",
            premioMedias: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/premiomediasgratis.png",
            premioSticker: "https://raw.githubusercontent.com/nsanchezBG/BBG/main/premiosticake.png"
        };

        const PRIZES_DB = [
            { img: ASSETS.premio5off, text: "un cupón de 5% de descuento!" },
            { img: ASSETS.premio10off, text: "un cupón de 10% de descuento!" },
            { img: ASSETS.premioBbcap, text: "una gorra exclusiva!" },
            { img: ASSETS.premioBurger, text: "una burger gratis!" },
            { img: ASSETS.premioMedias, text: "unas medias exclusivas!" },
            { img: ASSETS.premioSticker, text: "un sticker CAKE X Burgerboy!" }
        ];

        const HYPE_TITLES = [
            "¡EPA!", "¡BUENA!", "¡ÉPICO!", "¡BUENAZO!", "¡ACHORAO!", "¡RICO PE!", "¡VAMOS!", 
            "¡BOOM!", "¡POOF!", "¡BIEN!", "¡GENIAL!", "¡QUÉ RICO!", "¡QUÉ SUERTE!", "¡NOS FUIMOS!"
        ];

        const STATIC_BALLS = Array.from({ length: 15 }).map((_, i) => ({
            id: i, size: Math.random() * 45 + 35, top: (i * (100 / 15)) + (Math.random() * 2), 
            duration: Math.random() * 25 + 20, delay: Math.random() * -45,
        }));

        const AnimatedBackground = React.memo(() => (
            <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
                {STATIC_BALLS.map((ball) => (
                    <img key={ball.id} src={ASSETS.gachaball} className="gacha-bg" style={{ width: `${ball.size}px`, height: `${ball.size}px`, top: `${ball.top}%`, left: '-150px', animationDuration: `${ball.duration}s`, animationDelay: `${ball.delay}s` }} />
                ))}
            </div>
        ));

        const InputField = ({ label, placeholder, type = "text", value, onChange }) => (
            <div className="flex flex-col w-full mb-3.5 items-center px-4">
                <label className="text-white text-lg tracking-wider mb-1 font-draftItalic">{label}</label>
                <input type={type} placeholder={placeholder} value={value} onChange={onChange} className="input-pill font-draftItalic" />
            </div>
        );

        const Checkbox = ({ checked, onChange, label }) => (
            <div className="flex items-center gap-3 mb-4 cursor-pointer px-4" onClick={onChange}>
                <div className="w-6 h-6 rounded-full bg-white flex items-center justify-center shrink-0">
                    {checked && <div className="w-3 h-3 rounded-full bg-bbBlue"></div>}
                </div>
                <div className="text-white text-[0.8rem] leading-tight font-draftItalic tracking-wide uppercase">{label}</div>
            </div>
        );

        const App = () => {
            const [screen, setScreen] = useState('splash'); 
            const [activeModal, setActiveModal] = useState(null);
            const [isUserMenuOpen, setIsUserMenuOpen] = useState(false); // Estado para el menú de usuario
            const [formData, setFormData] = useState({ doc: '', pass: '', name: '', dni: '', phone: '', email: '', newPass: '', confirmPass: '', tcAccepted: false, dataAccepted: false });
            
            const [gachaResult, setGachaResult] = useState({ prize: null, title: '', code: '' });
            const user = { name: "Cezochromo", bps: 6, document: "46870938" }; // Documento mock añadido

            const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
            const toggleCheck = (field) => setFormData(prev => ({ ...prev, [field]: !prev[field] }));

            const handleLogin = () => setScreen('mainMenu'); 
            const handleRegister = () => {
                if (!formData.tcAccepted || formData.newPass !== formData.confirmPass) return;
                setScreen('success');
            };

            const handleLogout = () => {
                setIsUserMenuOpen(false);
                setScreen('splash'); // Regresa al splash (se re-animará)
            };

            const passwordsMatch = formData.newPass === formData.confirmPass;
            const showTooltip = !passwordsMatch && formData.confirmPass.length > 0;

            // --- Lógica de Gacha ---
            const handleCanjearAction = () => {
                const rPrize = PRIZES_DB[Math.floor(Math.random() * PRIZES_DB.length)];
                const rTitle = HYPE_TITLES[Math.floor(Math.random() * HYPE_TITLES.length)];
                const rCode = "BBG-" + Math.random().toString(36).substring(2, 8).toUpperCase() + "X";
                setGachaResult({ prize: rPrize, title: rTitle, code: rCode });

                setScreen('gachaTransition');
                setTimeout(() => setScreen('gachaWait'), 1000); 
            };

            const handleGachaTap = () => {
                setScreen('gachaFalling'); 
                setTimeout(() => {
                    setScreen('gachaShake'); 
                    setTimeout(() => {
                        setScreen('gachaReveal'); 
                        setTimeout(() => {
                            setScreen('gachaPrizeFinal'); 
                        }, 1800);
                    }, 1200);
                }, 1400);
            };

            const handleGoToCanjes = () => {
                setScreen('gachaExit'); 
                setTimeout(() => setScreen('misCanjes'), 400);
            };

            // --- Lógica de Escaneo ---
            const handleScanTransition = () => {
                setScreen('scanTransition'); 
                setTimeout(() => setScreen('scanMain'), 800); 
            };

            const handleVerifyScan = () => {
                setScreen('scanVerifying'); 
                setTimeout(() => setScreen('scanSuccess'), 2500);
            };

            // Estilos para Logotipos
            const getIsologoStyle = () => {
                switch(screen) {
                    case 'home': return { transform: 'translateY(10vh) scale(1)', opacity: 1 };
                    case 'login': case 'reg1': case 'reg2': case 'success': return { transform: 'translateY(2vh) scale(0.55)', opacity: 1 };
                    default: return { transform: 'translateY(8vh) scale(1)', opacity: 0, pointerEvents: 'none' };
                }
            };

            const getLogoSimpleStyle = () => {
                switch(screen) {
                    case 'mainMenu': return { transform: 'translateY(10vh) scale(0.85)', opacity: 1 };
                    case 'misCanjes': return { transform: 'translateY(13vh) scale(0.65)', opacity: 1 };
                    case 'scanTransition': return { transform: 'translateY(10vh) scale(0.85)', opacity: 0, transitionDuration: '300ms' }; 
                    default: return { transform: 'translateY(8vh) scale(0.72)', opacity: 0, pointerEvents: 'none', transitionDuration: '300ms' }; 
                }
            };

            const showBackButton = ['login', 'reg1', 'reg2', 'scanMain', 'scanModal', 'scanVerifying', 'scanSuccess'].includes(screen);
            
            // Logica del User Pill Global
            const hideUserPillScreens = ['splash', 'home', 'login', 'reg1', 'reg2', 'success'];
            const showUserPill = !hideUserPillScreens.includes(screen);

            return (
                <div className="mobile-container flex flex-col items-center shadow-2xl">
                    <AnimatedBackground />

                    {/* Top Bar: Usuario y BPs (Dynamic Island Style) */}
                    <div className={`absolute top-4 right-4 z-[65] transition-opacity duration-300 ${showUserPill ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <div 
                            className={`bg-bbDark text-white medium-border flex flex-col items-center shadow-md transition-all duration-300 ease-out overflow-hidden cursor-pointer ${isUserMenuOpen ? 'rounded-[1.5rem] w-[220px] p-4' : 'rounded-full px-2.5 py-1'}`}
                            onClick={() => setIsUserMenuOpen(!isUserMenuOpen)}
                        >
                            {/* Estado Colapsado (Pill Normal) */}
                            <div className={`flex items-center w-full justify-between transition-opacity duration-200 ${isUserMenuOpen ? 'opacity-0 h-0 hidden' : 'opacity-100'}`}>
                                <div className="flex items-center">
                                    <div className="w-5 h-5 mr-1.5 bg-white rounded-full flex items-center justify-center p-[2px]">
                                        <img src={ASSETS.userLogo} alt="User" className="w-full h-full object-contain" />
                                    </div>
                                    <span className="font-draftItalic text-sm pt-0.5 tracking-wide">{user.name}</span>
                                </div>
                                <div className="flex items-center">
                                    <span className="mx-2 text-white/50">|</span>
                                    <span className="font-draftItalic text-sm pt-0.5 tracking-wide">{user.bps} BPs</span>
                                </div>
                            </div>

                            {/* Estado Expandido (Menú Flotante) */}
                            <div className={`flex flex-col items-center w-full transition-opacity duration-300 delay-100 ${isUserMenuOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>
                                <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center mb-2 p-1 overflow-hidden border-2 border-bbLight">
                                    <img src={ASSETS.userLogo} alt="User" className="w-full h-full object-contain" />
                                </div>
                                <span className="font-draftItalic text-lg tracking-wide">{user.name}</span>
                                <span className="font-draftItalic text-xs text-white/70 mb-4 tracking-wider">DNI/CE: {user.document}</span>
                                
                                <div className="w-full h-[1px] bg-white/20 mb-3"></div>
                                
                                <div className="flex justify-between w-full mb-3 px-2">
                                    <span className="font-draftItalic text-sm opacity-80">Burger Points:</span>
                                    <span className="font-draftItalic text-sm text-bbLight">{user.bps}</span>
                                </div>

                                <button 
                                    onClick={(e) => { e.stopPropagation(); setActiveModal('terms'); setIsUserMenuOpen(false); }}
                                    className="text-[0.7rem] text-white/60 underline font-sans mb-4 active:text-white transition-colors"
                                >
                                    Ver Términos y Condiciones
                                </button>

                                <button 
                                    onClick={(e) => { e.stopPropagation(); handleLogout(); }}
                                    className="bg-bbRed text-white rounded-full w-full py-2 font-draftItalic uppercase tracking-widest text-sm active:scale-95 transition-transform"
                                >
                                    Cerrar Sesión
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Capa invisible para cerrar el menu al tocar fuera */}
                    {isUserMenuOpen && (
                        <div className="absolute inset-0 z-[60]" onClick={() => setIsUserMenuOpen(false)}></div>
                    )}

                    {/* Botón de retroceso nativo (Con Animación de Entrada) */}
                    {showBackButton && (
                        <button 
                            onClick={() => {
                                if (['scanMain', 'scanModal', 'scanVerifying', 'scanSuccess'].includes(screen)) setScreen('mainMenu');
                                else if (screen === 'reg2') setScreen('reg1');
                                else setScreen('home');
                            }}
                            className="absolute top-6 left-5 z-[65] p-2 active:scale-90 transition-transform animate-fade-in-left"
                        >
                            <img src={ASSETS.backIcon} alt="Volver" className="w-8 h-auto object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }}/>
                            <svg style={{display: 'none'}} className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="#04172c" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </button>
                    )}

                    {/* Modal Legal de Términos / Tratamiento de Datos (Textos Realistas) */}
                    <div className={`absolute inset-0 z-[70] flex items-center justify-center p-6 bg-[#04172c]/80 backdrop-blur-[2px] transition-opacity duration-300 ${activeModal ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>

                        <div className={`w-full flex flex-col items-center transition-opacity duration-300 ${screen === 'reg1' ? 'opacity-100 relative' : 'opacity-0 absolute hidden'}`}>

                            <InputField label="DNI/CE" placeholder="*************" value={formData.dni} onChange={(e) => handleChange('dni', e.target.value)} />
                            <InputField label="TELÉFONO" placeholder="*************" type="tel" value={formData.phone} onChange={(e) => handleChange('phone', e.target.value)} />
                            <InputField label="CORREO" placeholder="*************" type="email" value={formData.email} onChange={(e) => handleChange('email', e.target.value)} />
                            <button onClick={() => setScreen('reg2')} className="bg-white text-bbDark uppercase text-2xl py-1.5 px-8 rounded-full font-draftItalic tracking-wider mt-2 active:scale-95 transition-transform">SIGUIENTE</button>
                        </div>
                        <div className={`w-full flex flex-col items-center transition-opacity duration-300 ${screen === 'reg2' ? 'opacity-100 relative' : 'opacity-0 absolute hidden'}`}>
                            <InputField label="CREA UNA CONTRASEÑA" placeholder="*************" type="password" value={formData.newPass} onChange={(e) => handleChange('newPass', e.target.value)} />
                            <div className="w-full relative px-4 flex flex-col items-center mb-2">
                                <label className="text-white text-lg tracking-wider mb-1.5 font-draftItalic text-center">REPITE LA CONTRASEÑA</label>
                                <input type="password" placeholder="*************" value={formData.confirmPass} onChange={(e) => handleChange('confirmPass', e.target.value)} className={`input-pill font-draftItalic ${showTooltip ? 'text-bbRed' : 'text-bbBlue'}`} />
                                <div className={`absolute top-full mt-[-2px] bg-bbRed text-white text-[0.8rem] px-4 py-1.5 rounded-b-xl font-draftItalic transition-all duration-300 z-10 whitespace-nowrap ${showTooltip ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-2 pointer-events-none'}`}>Las contraseñas no coinciden</div>
                            </div>
                            <div className="w-full px-6 mt-6">
                                <Checkbox checked={formData.tcAccepted} onChange={() => toggleCheck('tcAccepted')} label={<>Acepto los <a href="#" className="underline font-draftItalic" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setActiveModal('terms'); }}>Términos y condiciones.</a></>} />
                                <Checkbox checked={formData.dataAccepted} onChange={() => toggleCheck('dataAccepted')} label={<>Acepto el <a href="#" className="underline font-draftItalic" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setActiveModal('data'); }}>Tratamiento opcional de datos.</a></>} />
                            </div>
                            <button onClick={handleRegister} className={`bg-white text-bbDark uppercase text-[1.3rem] py-2 px-6 rounded-full font-draftItalic tracking-wider mt-2 active:scale-95 transition-transform ${!passwordsMatch && formData.confirmPass ? 'opacity-60' : ''}`}>REGISTRARME</button>
                        </div>
                        <div className={`w-full flex flex-col items-center justify-center py-4 transition-opacity duration-300 ${screen === 'success' ? 'opacity-100 relative' : 'opacity-0 absolute hidden'}`}>
                            <div className="w-24 h-24 rounded-full border-[5px] border-white flex items-center justify-center mb-6 mt-4">
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="w-14 h-14"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </div>
                            <h2 className="text-white text-3xl mb-12 tracking-widest font-draftItalic">¡TODO LISTO!</h2>
                            <button onClick={() => { setFormData(prev => ({...prev, pass: '', newPass: '', confirmPass: ''})); setScreen('login'); }} className="bg-white text-bbDark uppercase text-[1.4rem] py-2 px-6 rounded-full font-draftItalic tracking-wider active:scale-95 transition-transform">INICIAR SESIÓN</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
